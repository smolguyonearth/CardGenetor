<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Simulator - 2 Player</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Turn Transition Overlay -->
    <div id="turn-overlay" class="overlay">
      <div class="overlay-content">
        <h2 id="overlay-title">Pass device to Player 1</h2>
        <button id="start-turn-btn" class="btn primary-btn">Start Turn</button>
      </div>
    </div>

    <!-- Card Inspection Overlay -->
    <div id="inspect-overlay" class="overlay">
      <div class="overlay-content inspect-content">
        <div id="inspect-card" class="card large-card"></div>
        <div class="controls-horizontal">
          <button id="inspect-use-btn" class="btn primary-btn">Use Card</button>
          <button id="inspect-send-btn" class="btn secondary-btn">Send</button>
          <button id="inspect-close-btn" class="btn action-btn">Close</button>
        </div>
      </div>
    </div>

    <div id="app">
      <header>
        <h1 id="player-turn-title">Player 1's Turn</h1>
        <p>Deck remaining: <span id="deck-count">70</span></p>
      </header>
      
      <div class="top-area">
        <div class="piles-container">
          <div class="deck-container">
            <div id="deck" class="card deck-card"></div>
            <div class="label">Draw Pile</div>
          </div>
          
          <div class="deck-container">
            <div id="discard-pile" class="card deck-card empty"></div>
            <div class="label">Discard Pile</div>
          </div>
        </div>
        
        <div class="controls-vertical">
          <button id="end-turn-btn" class="btn action-btn">End Turn</button>
          <button id="shuffle-btn" class="btn secondary-btn">Restart Game</button>
        </div>
      </div>

      <main class="player-area">
        <div class="section-title">Your Hand</div>
        <p class="hint">Click a card to inspect it</p>
        <div id="player-hand" class="card-row">
          <!-- Cards injected here -->
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
